<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Platformer Game</title>

  <style>
    /* Basic page and body setup */
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* The game canvas where everything will be drawn */
    #gameCanvas {
      display: block;
    }

    /* Start screen overlay */
    #startOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 400px;
      height: 600px;
      background: url('pride.png') no-repeat center center;
      background-size: cover;
      color: black;
      text-align: center;
      padding-top: 200px;
      z-index: 3; /* Highest layer to be above everything */
    }

    /* Start button style */
    #startButton {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 20px;
      cursor: pointer;
    }

    /* Game Over overlay */
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 400px;
      height: 600px;
      background: none; /* transparent background */
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 2; /* Below start overlay */
    }

    /* Content inside the Game Over overlay */
    #overlayContent {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Game Over title style */
    #overlay h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    /* Leaderboard (top scores) section */
    #leaderboard {
      margin-top: 30px;
      font-size: 18px;
    }

    /* List inside the leaderboard */
    #scoreList {
      list-style: none;
      padding-left: 0;
      margin: 20px auto 0;
      text-align: center;
      font-size: 18px;
      font-family: monospace;
      width: fit-content;
    }

    /* Each score item styling */
    #scoreList li {
      display: flex;
      justify-content: space-between;
      width: 120px;
    }

    /* Play again button styling */
    #playAgain {
      padding: 10px 20px;
      font-size: 18px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- Start Screen (shows before the game begins) -->
<div id="startOverlay">
  <h1>Are you ready to celebrate your pride?</h1>
  <button id="startButton">Play</button>
</div>

<!-- Main Game Canvas -->
<canvas id="gameCanvas" width="400" height="500"></canvas>

<!-- Game Over Overlay (shows after losing) -->
<div id="overlay">
  <div id="overlayContent">
    <h1>Game Over</h1>
    <button id="playAgain">Play Again</button>
    <div id="leaderboard">
      <h3>Top 10 Scores</h3>
      <ol id="scoreList"></ol>
    </div>
  </div>
</div>

<script>
// --------- START OVERLAY SETUP ---------
const startOverlay = document.getElementById('startOverlay');
const startButton = document.getElementById('startButton');

// When the user clicks the Play button
startButton.addEventListener('click', () => {
  startOverlay.style.display = 'none'; // Hide the start screen
  document.getElementById('overlay').style.display = 'none'; // Hide Game Over screen
  canvas.style.display = 'block'; // Show the game canvas
  isGameOver = false; // Reset game state
  backgroundMusic.play(); // Start playing background music
  isDying = false; // Reset dying state
  playerRotation = 0; // Reset player rotation
  player.x = canvas.width / 2; // Reset player position
  player.y = canvas.height - 40;
  player.velX = 0;
  player.velY = 0;
  player.jumping = false;
  score = 0; // Reset score
  worldOffset = 0;
  maxPlatformHeightReached = 0;
  lastLandingTime = performance.now();
  platforms = []; // Reset platforms
  nextPlatformIndex = 2;
  lastPlatformY = canvas.height - 120;

  // Create the first platform
  platforms.push({
    x: canvas.width / 2 - 50,
    y: lastPlatformY,
    width: 120,
    height: 20,
    timeOnTop: 0,
    falling: false,
    index: 1,
    enemy: null,
    hasStar: Math.random() < 0.1, // 10% chance for star
    hasSpring: Math.random() < 0.04, // 4% chance for spring
    flagIndex: Math.floor(Math.random() * flagImages.length),
    moving: false
  });

  // Create the next 30 platforms
  for (let i = 1; i < 30; i++) {
    const spacing = getDynamicSpacing(lastPlatformY);
    lastPlatformY -= spacing;
    const index = nextPlatformIndex++;
    let width = 120;
    const hasEnemy = enemyIndices.has(index);
    const isWide = Math.random() < 0.1 && !hasEnemy;
    if (isWide) width = 180;
    const platform = {
      x: Math.random() * (canvas.width - width),
      y: lastPlatformY,
      width,
      height: 20,
      timeOnTop: 0,
      falling: false,
      index,
      enemy: null,
      hasStar: Math.random() < 0.1,
      hasSpring: Math.random() < 0.04,
      flagIndex: Math.floor(Math.random() * flagImages.length),
      moving: Math.random() < 0.06 && !hasEnemy,
      direction: 1,
      baseY: lastPlatformY
    };
    // If platform should have an enemy
    if (hasEnemy) {
      const type = (type1Count <= type2Count) ? 1 : 2;
      if (type === 1) type1Count++; else type2Count++;
      platform.enemy = {
        type,
        x: platform.x + 10,
        y: platform.y - 30,
        width: 30,
        height: 30,
        dir: 1
      };
    }
    platforms.push(platform);
  }
  updateGame(); // Start the game loop
});

// --------- CANVAS AND CONTEXT ---------
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --------- IMAGES ---------
const backgroundImage = new Image();
backgroundImage.src = 'background_rainbow.png';

const playerImage = new Image();
playerImage.src = 'Sarit_player.png';

const bezalelEnemyImg = new Image();
bezalelEnemyImg.src = 'Bezalel_enemy.png';

const eyalEnemyImg = new Image();
eyalEnemyImg.src = 'Eyal_enemy.png';

const starImage = new Image();
starImage.src = 'star.png';

const crownImage = new Image();
crownImage.src = 'crown.png'; 

const springImage = new Image();
springImage.src = 'drum.png'; 

// Load flag images
const flagImages = [
  'GayFlag.png', 'AbinaryFlag.png', 'LesbianFlag.png', 'TransFlag.png'
].map(src => {
  const img = new Image();
  img.src = src;
  return img;
});

// --------- AUDIO ---------
const backgroundMusic = new Audio('Dana_music.mp3');
backgroundMusic.loop = true;
backgroundMusic.volume = 0.3;
backgroundMusic.play();

const milestoneSound = new Audio('Tarimii.mp3');
milestoneSound.volume = 0.8;

// --------- PHYSICS CONSTANTS ---------
const gravity = 0.5;
const friction = 0.8;
const baseJump = -12;

// --------- INVINCIBILITY STATE ---------
let isInvincible = false;
let invincibleEndTime = 0;

// --------- PLATFORM SPACING ---------
const maxJumpHeight = Math.pow(Math.abs(baseJump), 2) / (2 * gravity);
const safeJumpHeight = maxJumpHeight * 0.6;
const minPlatformSpacing = safeJumpHeight * 0.6;

function getDynamicSpacing(y) {
  return minPlatformSpacing;
}

// --------- ENEMY GENERATION ---------
const ENEMY_PERCENT = 0.05;
const totalPlatformLimit = 10000;
const enemyEvery = Math.floor(1 / ENEMY_PERCENT);
const enemyIndices = new Set();
for (let i = 0; i < totalPlatformLimit / enemyEvery; i++) {
  const offset = Math.floor(Math.random() * enemyEvery);
  enemyIndices.add(i * enemyEvery + offset);
}

// --------- GAME STATE ---------
let type1Count = 0;
let type2Count = 0;
let score = 0;
let worldOffset = 0;
let maxPlatformHeightReached = 0;
let lastLandingTime = performance.now();
let lastPlatformY = canvas.height - 120;
let nextPlatformIndex = 2;
let isGameOver = false;
let lastMilestone = 0;
let pendingGameOver = false;

// --------- PLAYER STATE ---------
let player = {
  x: canvas.width / 2,
  y: canvas.height - 40,
  width: 40,
  height: 40,
  speed: 5,
  velX: 0,
  velY: 0,
  jumping: false
};
let isDying = false;
let playerRotation = 0;

// --------- INITIAL PLATFORM ---------
let platforms = [];
platforms.push({
  x: canvas.width / 2 - 50,
  y: lastPlatformY,
  width: 120,
  height: 20,
  timeOnTop: 0,
  falling: false,
  index: 1,
  enemy: null,
  hasStar: Math.random() < 0.1,
  hasSpring: Math.random() < 0.04, 
  flagIndex: Math.floor(Math.random() * flagImages.length),
  moving: false
});

// --------- CREATE INITIAL PLATFORMS ---------
for (let i = 1; i < 30; i++) {
  const spacing = getDynamicSpacing(lastPlatformY);
  lastPlatformY -= spacing;
  const index = nextPlatformIndex++;
  let width = 120;
  const hasEnemy = enemyIndices.has(index);
  const isWide = Math.random() < 0.1 && !hasEnemy;
  if (isWide) width = 180;
  
  const platform = {
    x: Math.random() * (canvas.width - width),
    y: lastPlatformY,
    width,
    height: 20,
    timeOnTop: 0,
    falling: false,
    index,
    enemy: null,
    hasStar: Math.random() < 0.1,
    hasSpring: Math.random() < 0.04,
    flagIndex: Math.floor(Math.random() * flagImages.length),
    moving: Math.random() < 0.06 && !hasEnemy,
    direction: 1,
    baseY: lastPlatformY
  };

  if (hasEnemy) {
    const type = (type1Count <= type2Count) ? 1 : 2;
    if (type === 1) type1Count++; else type2Count++;
    platform.enemy = {
      type,
      x: platform.x + 10,
      y: platform.y - 30,
      width: 30,
      height: 30,
      dir: 1
    };
  }
  platforms.push(platform);
}

// --------- KEYBOARD CONTROLS ---------
let keys = [];
window.addEventListener('keydown', e => {
  keys[e.keyCode] = true;
  if (e.keyCode === 32 && !player.jumping && !isGameOver) {
    player.jumping = true;
    player.velY = baseJump - Math.abs(player.velX);
  }
});
window.addEventListener('keyup', e => keys[e.keyCode] = false);

// --------- RELOAD BUTTON ---------
document.getElementById('playAgain').addEventListener('click', () => {
  location.reload();
});

// --------- SCORE MANAGEMENT ---------
function saveScore(score) {
  const scores = JSON.parse(localStorage.getItem("topScores") || "[]");
  scores.push(score);
  scores.sort((a, b) => b - a);
  localStorage.setItem("topScores", JSON.stringify(scores.slice(0, 10)));
}

// --------- Function to display the Game Over screen ---------
function showGameOver() {
  saveScore(score); // Save the current score into local storage
  document.getElementById('overlay').style.display = 'block'; // Show the Game Over overlay
  backgroundMusic.pause(); // Pause the background music
  
  // Load the top scores from local storage
  const scores = JSON.parse(localStorage.getItem("topScores") || "[]");
  const list = document.getElementById('scoreList');
  list.innerHTML = ''; // Clear previous list
  
  // Populate the leaderboard with top scores
  scores.forEach((s, i) => {
    const li = document.createElement('li');
    li.style.display = 'flex';
    li.style.justifyContent = 'center';
    li.style.alignItems = 'center';
    li.style.gap = '5px';
    li.innerHTML = `<span>${i + 1}.</span><span>${s}</span>`;
    list.appendChild(li);
  });
}

// --------- Main game update loop ---------
function updateGame() {
  if (isGameOver) return; // Stop updating if the game is over

  ctx.save(); // Save the current drawing state

  // Handle ending of invincibility
  if (isInvincible && Date.now() > invincibleEndTime) {
    isInvincible = false;
  }

  // Draw background
  ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);

  // Handle player movement
  if (keys[39]) if (player.velX < player.speed) player.velX++;
  if (keys[37]) if (player.velX > -player.speed) player.velX--;
  player.velX *= friction;
  player.velY += gravity;
  player.x += player.velX;
  player.y += player.velY;

  // Handle player death animation
  if (isDying) {
    player.velY += gravity;
    player.y += player.velY;
    playerRotation += 0.2; // Continue rotating the player

    if (player.y > canvas.height && !pendingGameOver) {
      pendingGameOver = true;
      setTimeout(() => {
          isGameOver = true;
          showGameOver();
      }, 1000); // Wait 1 second after falling to show Game Over
    }
  }

  // Start dying if player falls off the screen
  if (player.y > canvas.height && !isDying) {
    isDying = true;
  }

  // Scroll the world if player goes above a certain height
  if (player.y < canvas.height / 4) {
    const shift = Math.abs(player.velY);
    player.y += shift;
    worldOffset += shift;
    platforms.forEach(platform => {
      platform.y += shift;
      platform.baseY += shift;
      if (platform.enemy) platform.enemy.y += shift;
      
      // Recycle platform if it goes off screen
      if (platform.y > canvas.height) {
        const spacing = getDynamicSpacing(lastPlatformY);
        lastPlatformY -= spacing;
        platform.y = lastPlatformY;
        platform.baseY = lastPlatformY;
        platform.x = Math.random() * (canvas.width - platform.width);
        platform.falling = false;
        platform.timeOnTop = 0;
        platform.index = nextPlatformIndex++;
        platform.hasStar = Math.random() < 0.1;
        platform.flagIndex = Math.floor(Math.random() * flagImages.length);
        platform.enemy = null;
        platform.moving = Math.random() < 0.06;

        if (enemyIndices.has(platform.index)) {
          const type = (type1Count <= type2Count) ? 1 : 2;
          if (type === 1) type1Count++; else type2Count++;
          platform.enemy = {
            type,
            x: platform.x + 10,
            y: platform.y - 30,
            width: 30,
            height: 30,
            dir: 1
          };
        }
      }
    });
  }

  // Prevent player from moving out of bounds
  if (player.x >= canvas.width - player.width) player.x = canvas.width - player.width;
  else if (player.x <= 0) player.x = 0;

  // Handle player landing on the ground
  if (player.y >= canvas.height - player.height) {
    player.y = canvas.height - player.height;
    player.jumping = false;
    player.velY = 0;
  }

  // --------- Platform and Enemy Updates ---------
  platforms.forEach(platform => {
    // Moving platforms
    if (platform.moving) {
      platform.y += platform.direction * 1.5;
      if (platform.y > platform.baseY + 20 || platform.y < platform.baseY - 20) {
        platform.direction *= -1;
      }
      if (platform.enemy) platform.enemy.y = platform.y - 30;
    }

    // Falling platforms
    if (platform.falling) {
      platform.y += 5;
      if (platform.enemy) platform.enemy.y += 5;
      return;
    }

    // Detect player landing on a platform
    if (
      player.x < platform.x + platform.width &&
      player.x + player.width > platform.x &&
      player.y + player.height > platform.y &&
      player.y + player.height < platform.y + platform.height &&
      player.velY >= 0
    ) {
      player.jumping = false;
      player.velY = 0;
      player.y = platform.y - player.height;

      const platformWorldHeight = worldOffset + (canvas.height - platform.y);
      if (platformWorldHeight > maxPlatformHeightReached) {
        const now = performance.now();
        const timeDiff = (now - lastLandingTime) / 1000;
        lastLandingTime = now;
        const heightGain = platformWorldHeight - maxPlatformHeightReached;
        const speedBonus = Math.max(1, 3 - timeDiff);
        const points = Math.floor(heightGain * speedBonus);
        score += points;
        maxPlatformHeightReached = platformWorldHeight;
      }

      // Mark platform to start falling after 4 seconds
      if (!platform.lastTouchTime) {
        platform.lastTouchTime = Date.now();
      } else if (Date.now() - platform.lastTouchTime >= 4000) {
        platform.falling = true;
      }
    } else {
      platform.lastTouchTime = null;
    }

    // Spring collision detection
    if (platform.hasSpring) {
      const springX = platform.x + platform.width / 2 - 10;
      const springY = platform.y - 20;
      if (player.x + player.width > springX &&
          player.x < springX + 20 &&
          player.y + player.height > springY &&
          player.y < springY + 20) {
        player.velY = -20; // Strong jump upwards
        platform.hasSpring = false;
      }
    }

    // Star collision detection
    if (platform.hasStar) {
      if (player.x < platform.x + platform.width &&
          player.x + player.width > platform.x &&
          player.y < platform.y &&
          player.y + player.height > platform.y - 20) {
        platform.hasStar = false;
        isInvincible = true;
        invincibleEndTime = Date.now() + 7000;
      }
    }

    // Enemy collision detection
    if (platform.enemy) {
      const e = platform.enemy;
      if (
        player.x < e.x + e.width &&
        player.x + player.width > e.x &&
        player.y < e.y + e.height &&
        player.y + player.height > e.y
      ) {
        if (!isInvincible && !isDying) {
          isDying = true;
          setTimeout(() => {
            isGameOver = true;
            showGameOver();
          }, 1000); // wait 1 second before ending game
        }
      }
    }
  });

  // --------- Drawing the Player ---------
  ctx.save();
  ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
  ctx.rotate(playerRotation);
  ctx.drawImage(playerImage, -player.width / 2, -player.height / 2, player.width, player.height);
  ctx.restore();

  // Draw crown if player is invincible
  if (isInvincible) {
    ctx.drawImage(crownImage, player.x + player.width / 2 - 10, player.y - 25, 20, 20);
  }

  // --------- Drawing the Platforms ---------
  platforms.forEach(platform => {
    if (platform.falling) {
      ctx.fillStyle = 'gray';
      ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
    } else {
      const flagImg = flagImages[platform.flagIndex];
      if (flagImg.complete) {
        ctx.drawImage(flagImg, platform.x, platform.y, platform.width, platform.height);
      }
    }

    // Draw platform index every 10 platforms
    if (platform.index % 10 === 0) {
      ctx.fillStyle = "white";
      ctx.font = "12px Arial";
      ctx.textAlign = "center";
      ctx.fillText(`${platform.index}`, platform.x + platform.width / 2, platform.y + platform.height + 15);
    }

    // Draw enemies
    if (platform.enemy) {
      const img = platform.enemy.type === 1 ? bezalelEnemyImg : eyalEnemyImg;
      ctx.drawImage(img, platform.enemy.x, platform.enemy.y, platform.enemy.width, platform.enemy.height);
    }

    // Draw stars
    if (platform.hasStar) {
      ctx.drawImage(starImage, platform.x + platform.width / 2 - 10, platform.y - 20, 20, 20);
    }

    // Draw springs
    if (platform.hasSpring) {
      ctx.drawImage(springImage, platform.x + platform.width / 2 - 10, platform.y - 20, 20, 20);
    }
  });

  // --------- Update and Draw Score ---------
  const currentMilestone = Math.floor(score / 10);
  if (currentMilestone > lastMilestone) {
    milestoneSound.play();
    lastMilestone = currentMilestone;
  }

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.textAlign = "left";
  ctx.textBaseline = "top";
  ctx.fillText(`Score: ${score}`, 20, 30);

  // --------- Request next frame ---------
  requestAnimationFrame(updateGame);
}

</script>
</body>
</html>
