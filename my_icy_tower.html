<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Platformer Game</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #gameCanvas {
      display: block;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 400px;
      height: 600px;
      display: none;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      text-align: center;
      z-index: 2;
      padding-top: 100px;
    }
    #overlay h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    #leaderboard {
      margin-top: 30px;
      font-size: 18px;
    }
    #scoreList {
      list-style: none;
      padding-left: 0;
      text-align: left;
      display: inline-block;
      font-size: 18px;
      font-family: monospace;
    }
    #scoreList li {
      display: flex;
      justify-content: space-between;
      width: 120px;
    }
    #playAgain {
      padding: 10px 20px;
      font-size: 18px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<div id="overlay">
  <h1>Game Over</h1>
  <button id="playAgain">Play Again</button>
  <div id="leaderboard">
    <h3>Top 10 Scores</h3>
    <ol id="scoreList"></ol>
  </div>
</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Load background image
  const backgroundImage = new Image();
  backgroundImage.src = 'background_rainbow.png';

  // Load player image
  const playerImage = new Image();
  playerImage.src = 'Sarit_player.png';

  const bezalelEnemyImg = new Image();
  bezalelEnemyImg.src = 'Bezalel_enemy.png';
  
  const eyalEnemyImg = new Image();
  eyalEnemyImg.src = 'Eyal_enemy.png';

  const gravity = 0.5;
  const friction = 0.8;
  const baseJump = -10;

  const maxJumpHeight = Math.pow(Math.abs(baseJump), 2) / (2 * gravity);
  const safeJumpHeight = maxJumpHeight * 0.6;
  const minPlatformSpacing = Math.floor(safeJumpHeight);

  function getDynamicSpacing(y) {
    const reduce = y * 0.0004;
    return Math.max(minPlatformSpacing * 0.6, minPlatformSpacing - reduce);
  }

  const ENEMY_PERCENT = 0.05;
  const totalPlatformLimit = 10000;
  const enemyEvery = Math.floor(1 / ENEMY_PERCENT);
  const enemyIndices = new Set();
  for (let i = 0; i < totalPlatformLimit / enemyEvery; i++) {
    const offset = Math.floor(Math.random() * enemyEvery);
    enemyIndices.add(i * enemyEvery + offset);
  }

  let type1Count = 0;
  let type2Count = 0;

  let score = 0;
  let worldOffset = 0;
  let maxPlatformHeightReached = 0;
  let lastLandingTime = performance.now();
  let lastPlatformY = canvas.height - 120;
  let nextPlatformIndex = 2;
  let isGameOver = false;

  let player = {
    x: canvas.width / 2,
    y: canvas.height - 40,
    width: 40,
    height: 40,
    speed: 5,
    velX: 0,
    velY: 0,
    jumping: false
  };

  let platforms = [];

  platforms.push({
    x: canvas.width / 2 - 50,
    y: lastPlatformY,
    width: 100,
    height: 10,
    timeOnTop: 0,
    falling: false,
    index: 1,
    enemy: null
  });

  for (let i = 1; i < 30; i++) {
    const spacing = getDynamicSpacing(lastPlatformY);
    lastPlatformY -= spacing;

    const index = nextPlatformIndex++;
    const platform = {
      x: Math.random() * (canvas.width - 50),
      y: lastPlatformY,
      width: 100,
      height: 10,
      timeOnTop: 0,
      falling: false,
      index: index,
      enemy: null
    };

    if (enemyIndices.has(index)) {
      const type = (type1Count <= type2Count) ? 1 : 2;
      if (type === 1) type1Count++; else type2Count++;
      platform.enemy = {
        type: type,
        x: platform.x + 10,
        y: platform.y - 30,
        width: 30 ,
        height: 30,
        dir: 1
      };
    }

    platforms.push(platform);
  }

  let keys = [];
  window.addEventListener('keydown', function (e) {
    keys[e.keyCode] = true;
    if (e.keyCode === 32 && !player.jumping && !isGameOver) {
      player.jumping = true;
      player.velY = baseJump - Math.abs(player.velX);
    }
  });

  window.addEventListener('keyup', function (e) {
    keys[e.keyCode] = false;
  });

  function saveScore(score) {
    const scores = JSON.parse(localStorage.getItem("topScores") || "[]");
    scores.push(score);
    scores.sort((a, b) => b - a);
    const top10 = scores.slice(0, 10);
    localStorage.setItem("topScores", JSON.stringify(top10));
  }

  function showGameOver() {
    saveScore(score);
    const overlay = document.getElementById('overlay');
    const list = document.getElementById('scoreList');
    const scores = JSON.parse(localStorage.getItem("topScores") || "[]");

    list.innerHTML = '';
    scores.forEach((s, i) => {
      const li = document.createElement('li');
      li.innerHTML = `<span>${i + 1}.</span><span>${s}</span>`;
      list.appendChild(li);
    });

    overlay.style.display = 'block';
  }

  document.getElementById('playAgain').addEventListener('click', () => {
    location.reload();
  });

  function updateGame() {
    if (isGameOver) return;

    ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);

    if (keys[39]) { if (player.velX < player.speed) player.velX++; }
    if (keys[37]) { if (player.velX > -player.speed) player.velX--; }

    player.velX *= friction;
    player.velY += gravity;

    player.x += player.velX;
    player.y += player.velY;

    if (player.y > canvas.height) {
      isGameOver = true;
      showGameOver();
      return;
    }

    if (player.y < canvas.height / 4) {
      const shift = Math.abs(player.velY);
      player.y += shift;
      worldOffset += shift;

      platforms.forEach(platform => {
        platform.y += shift;
        if (platform.enemy) platform.enemy.y += shift;

        if (platform.y > canvas.height) {
          const spacing = getDynamicSpacing(lastPlatformY);
          lastPlatformY -= spacing;

          platform.y = lastPlatformY;
          platform.x = Math.random() * (canvas.width - platform.width);
          platform.falling = false;
          platform.timeOnTop = 0;
          platform.index = nextPlatformIndex++;
          platform.enemy = null;

          if (enemyIndices.has(platform.index)) {
            const type = (type1Count <= type2Count) ? 1 : 2;
            if (type === 1) type1Count++; else type2Count++;
            platform.enemy = {
              type: type,
              x: platform.x + 10,
              y: platform.y - 20,
              width: 20,
              height: 20,
              dir: 1
            };
          }
        }
      });
    }

    if (player.x >= canvas.width - player.width) player.x = canvas.width - player.width;
    else if (player.x <= 0) player.x = 0;

    if (player.y >= canvas.height - player.height) {
      player.y = canvas.height - player.height;
      player.jumping = false;
      player.velY = 0;
    }

    platforms.forEach(platform => {
      if (platform.falling) {
        platform.y += 5;
        if (platform.enemy) platform.enemy.y += 5;
        return;
      }

      if (
        player.x < platform.x + platform.width &&
        player.x + player.width > platform.x &&
        player.y + player.height > platform.y &&
        player.y + player.height < platform.y + platform.height &&
        player.velY >= 0
      ) {
        player.jumping = false;
        player.velY = 0;
        player.y = platform.y - player.height;

        const platformWorldHeight = worldOffset + (canvas.height - platform.y);
        if (platformWorldHeight > maxPlatformHeightReached) {
          const now = performance.now();
          const timeDiff = (now - lastLandingTime) / 1000;
          lastLandingTime = now;

          const heightGain = platformWorldHeight - maxPlatformHeightReached;
          const speedBonus = Math.max(1, 3 - timeDiff);
          const points = Math.floor(heightGain * speedBonus);

          score += points;
          maxPlatformHeightReached = platformWorldHeight;
        }

        platform.timeOnTop += 1 / 60;
        if (platform.timeOnTop >= 4) {
          platform.falling = true;
        }
      } else {
        platform.timeOnTop = 0;
      }

      if (platform.enemy && platform.enemy.type === 2) {
        const e = platform.enemy;
        e.x += e.dir * 1;
        if (e.x < platform.x || e.x + e.width > platform.x + platform.width) {
          e.dir *= -1;
        }
      }

      if (platform.enemy) {
        const e = platform.enemy;
        if (
          player.x < e.x + e.width &&
          player.x + player.width > e.x &&
          player.y < e.y + e.height &&
          player.y + player.height > e.y
        ) {
          isGameOver = true;
          showGameOver();
        }
      }
    });

    // Draw player as image
    ctx.drawImage(playerImage, player.x, player.y, player.width, player.height);

    // Draw platforms and enemies
    platforms.forEach(platform => {
      ctx.fillStyle = platform.falling ? 'gray' : 'black';
      ctx.fillRect(platform.x, platform.y, platform.width, platform.height);

      if (platform.index % 10 === 0) {
        ctx.fillStyle = "white";
        ctx.font = "12px Arial";
        ctx.fillText(`${platform.index}`, platform.x + platform.width / 2 - 8, platform.y - 5);
      }

      if (platform.enemy) {
        const img = platform.enemy.type === 1 ? bezalelEnemyImg : eyalEnemyImg;
        ctx.drawImage(img, platform.enemy.x, platform.enemy.y, platform.enemy.width, platform.enemy.height);
      }
    });

    // Draw score
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText(`Score: ${score}`, 10, 30);

    requestAnimationFrame(updateGame);
  }

  updateGame();
</script>
</body>
