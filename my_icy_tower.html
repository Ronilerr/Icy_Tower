<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Platformer - Safe Spacing Fix</title>
  <style>
    body, html { margin: 0; padding: 0; overflow: hidden; }
    #gameCanvas { background-color: #87CEEB; display: block; }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="400" height="600"></canvas>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const gravity = 0.5;
  const friction = 0.8;
  const baseJump = -10;

  const maxJumpHeight = Math.pow(Math.abs(baseJump), 2) / (2 * gravity); // תיאורטי
  const safeJumpHeight = maxJumpHeight * 0.6; // בטוח יותר
  const minPlatformSpacing = Math.floor(safeJumpHeight); // השימושי בפועל

  let score = 0;
  let worldOffset = 0;
  let maxPlatformHeightReached = 0;
  let lastLandingTime = performance.now();

  let lastPlatformY = canvas.height - 120;
  let nextPlatformIndex = 2;

  let player = {
    x: canvas.width / 2,
    y: canvas.height - 20,
    width: 20,
    height: 20,
    speed: 5,
    velX: 0,
    velY: 0,
    jumping: false
  };

  let platforms = [];

  platforms.push({
    x: canvas.width / 2 - 50,
    y: lastPlatformY,
    width: 100,
    height: 10,
    timeOnTop: 0,
    falling: false,
    index: 1
  });

  for (let i = 1; i < 30; i++) {
    lastPlatformY -= minPlatformSpacing;
    platforms.push({
      x: Math.random() * (canvas.width - 50),
      y: lastPlatformY,
      width: 100,
      height: 10,
      timeOnTop: 0,
      falling: false,
      index: nextPlatformIndex++
    });
  }

  let keys = [];
  window.addEventListener('keydown', function (e) {
    keys[e.keyCode] = true;
    if (e.keyCode === 32 && !player.jumping) {
      player.jumping = true;
      player.velY = baseJump - Math.abs(player.velX);
    }
  });

  window.addEventListener('keyup', function (e) {
    keys[e.keyCode] = false;
  });

  function updateGame() {
    if (keys[39]) { if (player.velX < player.speed) player.velX++; }
    if (keys[37]) { if (player.velX > -player.speed) player.velX--; }

    player.velX *= friction;
    player.velY += gravity;

    player.x += player.velX;
    player.y += player.velY;

    if (player.y < canvas.height / 4) {
      const shift = Math.abs(player.velY);
      player.y += shift;
      worldOffset += shift;

      platforms.forEach(platform => {
        platform.y += shift;
        if (platform.y > canvas.height) {
          lastPlatformY -= minPlatformSpacing;
          platform.y = lastPlatformY;
          platform.x = Math.random() * (canvas.width - platform.width);
          platform.falling = false;
          platform.timeOnTop = 0;
          platform.index = nextPlatformIndex++;
        }
      });
    }

    if (player.x >= canvas.width - player.width) player.x = canvas.width - player.width;
    else if (player.x <= 0) player.x = 0;

    if (player.y >= canvas.height - player.height) {
      player.y = canvas.height - player.height;
      player.jumping = false;
      player.velY = 0;
    }

    platforms.forEach(platform => {
      if (platform.falling) {
        platform.y += 5;
        return;
      }

      if (
        player.x < platform.x + platform.width &&
        player.x + player.width > platform.x &&
        player.y + player.height > platform.y &&
        player.y + player.height < platform.y + platform.height &&
        player.velY >= 0
      ) {
        player.jumping = false;
        player.velY = 0;
        player.y = platform.y - player.height;

        const platformWorldHeight = worldOffset + (canvas.height - platform.y);
        if (platformWorldHeight > maxPlatformHeightReached) {
          const now = performance.now();
          const timeDiff = (now - lastLandingTime) / 1000;
          lastLandingTime = now;

          const heightGain = platformWorldHeight - maxPlatformHeightReached;
          const speedBonus = Math.max(1, 3 - timeDiff);
          const points = Math.floor(heightGain * speedBonus);

          score += points;
          maxPlatformHeightReached = platformWorldHeight;
        }

        platform.timeOnTop += 1 / 60;
        if (platform.timeOnTop >= 4) {
          platform.falling = true;
        }
      } else {
        platform.timeOnTop = 0;
      }
    });

    // Draw
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'red';
    ctx.fillRect(player.x, player.y, player.width, player.height);

    platforms.forEach(platform => {
      ctx.fillStyle = platform.falling ? 'gray' : 'black';
      ctx.fillRect(platform.x, platform.y, platform.width, platform.height);

      if (platform.index % 10 === 0) {
        ctx.fillStyle = "white";
        ctx.font = "12px Arial";
        ctx.fillText(`${platform.index}`, platform.x + platform.width / 2 - 8, platform.y - 5);
      }
    });

    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText(`Score: ${score}`, 10, 30);

    requestAnimationFrame(updateGame);
  }

  updateGame();
</script>
</body>
</html>
